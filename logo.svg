<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Transparent background -->
  <rect width="100%" height="100%" fill="none"/>

  <!-- Tilted square block -->
  <g transform="rotate(-15 256 256)">
    <rect x="156" y="156" width="200" height="200" rx="24"
          fill="#f4b400" stroke="#000" stroke-width="16"/>
    <!-- Eyes -->
    <circle cx="206" cy="226" r="28" fill="#00bfff" stroke="#000" stroke-width="8"/>
    <circle cx="306" cy="226" r="28" fill="#00bfff" stroke="#000" stroke-width="8"/>
    <!-- Mouth -->
    <rect x="216" y="286" width="80" height="20" rx="6"
          fill="#000" stroke="#000" stroke-width="4"/>
  </g>

  <!-- Text label -->
  <text x="50%" y="480" text-anchor="middle"
        font-family="Verdana, sans-serif" font-weight="700"
        font-size="48" fill="#b8ffb0" stroke="#000" stroke-width="2">
    GD Clone
  </text>
</svg>